<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ShoutMate is a free, no-login expense splitter for group trips. Track shared costs, split bills fairly and settle up in seconds. The simple, free alternative to Splitwise and Tricount." />
    <title>ShoutMate – Free Trip Expense Splitter | Splitwise Alternative</title>
    <link rel="canonical" href="https://www.shoutmate.app/" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JZ2J9LQ6K8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JZ2J9LQ6K8');
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.shoutmate.app/" />
    <meta property="og:title" content="ShoutMate – Free Trip Expense Splitter" />
    <meta property="og:description" content="Split costs, not friendships. Track shared expenses on your group trip and settle up in seconds. Free, no account needed." />
    <meta property="og:image" content="https://www.shoutmate.app/preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.shoutmate.app/preview.png" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ShoutMate",
      "description": "Free group expense splitter for trips. Track shared costs and settle up instantly. No account required.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "url": "https://www.shoutmate.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/main.scss" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div role="status" id="live-region" class="sr-only" aria-atomic="true"></div>
    <div id="app">
      <header class="header">
        <div class="header__inner">
          <!-- Populated by JS: home brand or trip header -->
        </div>
      </header>

      <!-- ── HOME VIEW ─────────────────────────────────────────── -->
      <div id="view-home" hidden>
        <main class="main" id="main-content" tabindex="-1">
          <div class="panel panel--active">
            <div class="panel__content">
              <div id="share-mount"></div>
              <div class="card">
                <h2 class="card__title" data-i18n="newTrip">New trip</h2>
                <form id="form-create-trip" class="form" novalidate>
                  <div class="form__row">
                    <div class="form__field">
                      <input
                        class="form__input"
                        type="text"
                        id="input-trip-name"
                        name="tripName"
                        placeholder="e.g. Ski Weekend, Lake House..."
                        data-i18n-placeholder="tripNamePlaceholder"
                        autocomplete="off"
                        maxlength="60"
                        required
                      />
                    </div>
                    <button class="btn btn--primary" type="submit" data-i18n="createBtn">Create</button>
                  </div>
                  <p class="form__error" id="error-trip-name" role="alert" aria-live="polite"></p>
                </form>
              </div>
              <div id="home-content"></div>
            </div>
          </div>
        </main>
        <div id="footer-mount-home"></div>
      </div>

      <!-- ── TRIP DETAIL VIEW ──────────────────────────────────── -->
      <div id="view-trip" hidden>
        <nav class="tabs" role="tablist" aria-label="Trip sections">
          <div class="tabs__inner">
            <button id="tab-people" class="tabs__btn tabs__btn--active" data-tab="people" role="tab" aria-selected="true" aria-controls="panel-people" tabindex="0">
              <span class="tabs__icon" aria-hidden="true">👥</span>
              <span data-i18n="tabPeople">People</span>
            </button>
            <button id="tab-expenses" class="tabs__btn" data-tab="expenses" role="tab" aria-selected="false" aria-controls="panel-expenses" tabindex="-1">
              <span class="tabs__icon" aria-hidden="true">💸</span>
              <span data-i18n="tabExpenses">Expenses</span>
            </button>
            <button id="tab-settle" class="tabs__btn" data-tab="settle" role="tab" aria-selected="false" aria-controls="panel-settle" tabindex="-1">
              <span class="tabs__icon" aria-hidden="true">🤝</span>
              <span data-i18n="tabSettleUp">Settle Up</span>
            </button>
          </div>
        </nav>

        <main class="main">
          <!-- People Tab -->
          <section id="panel-people" class="panel panel--active" role="tabpanel" aria-labelledby="tab-people">
            <div class="panel__content">
              <div class="card">
                <h2 class="card__title" data-i18n="whoComing">Who's coming?</h2>
                <form id="form-add-person" class="form" novalidate>
                  <div class="form__row">
                    <div class="form__field">
                      <label class="form__label" for="input-person-name" data-i18n="nameLabel">Name</label>
                      <input
                        class="form__input"
                        type="text"
                        id="input-person-name"
                        name="name"
                        placeholder="e.g. Alex"
                        data-i18n-placeholder="personNamePlaceholder"
                        autocomplete="off"
                        maxlength="40"
                        required
                      />
                    </div>
                    <button class="btn btn--primary btn--icon" type="submit" aria-label="Add person" data-i18n-aria="addPersonAriaLabel">
                      <span data-i18n="addPersonBtn">Add</span>
                    </button>
                  </div>
                  <p class="form__error" id="error-person-name" role="alert" aria-live="polite"></p>
                </form>
              </div>
              <div id="people-list" class="people-list"></div>
            </div>
          </section>

          <!-- Expenses Tab -->
          <section id="panel-expenses" class="panel" role="tabpanel" aria-labelledby="tab-expenses" hidden>
            <div class="panel__content">
              <div class="card" id="expense-form-card">
                <h2 class="card__title" data-i18n="addExpenseTitle">Add an expense</h2>
                <div id="expenses-no-people" class="empty-state" hidden>
                  <p data-i18n="noPeopleForExpenses">Add some people first before logging expenses.</p>
                </div>
                <form id="form-add-expense" class="form" novalidate>
                  <div class="form__field">
                    <label class="form__label" for="input-expense-desc" data-i18n="descriptionLabel">Description</label>
                    <input
                      class="form__input"
                      type="text"
                      id="input-expense-desc"
                      name="description"
                      placeholder="e.g. Groceries, Airbnb, Petrol..."
                      data-i18n-placeholder="expenseDescPlaceholder"
                      autocomplete="off"
                      maxlength="80"
                      required
                    />
                  </div>
                  <div class="form__row">
                    <div class="form__field">
                      <label class="form__label" for="input-expense-amount" data-i18n="amountLabel">Amount</label>
                      <input
                        class="form__input"
                        type="number"
                        id="input-expense-amount"
                        inputmode="decimal"
                        name="amount"
                        placeholder="0.00"
                        min="0.01"
                        step="0.01"
                        required
                      />
                    </div>
                    <div class="form__field">
                      <label class="form__label" for="input-expense-paid-by" data-i18n="paidByLabel">Paid by</label>
                      <select class="form__select" id="input-expense-paid-by" name="paidById" required>
                        <option value="">Select person</option>
                      </select>
                    </div>
                  </div>
                  <div class="form__field">
                    <label class="form__label" data-i18n="splitAmongLabel">Split among</label>
                    <div id="split-among-checkboxes" class="checkboxes"></div>
                  </div>
                  <p class="form__error" id="error-expense" role="alert" aria-live="polite"></p>
                  <button class="btn btn--primary btn--full" type="submit" data-i18n="addExpenseBtn">Add Expense</button>
                </form>
              </div>
              <div id="expenses-list" class="expenses-list"></div>
            </div>
          </section>

          <!-- Settle Up Tab -->
          <section id="panel-settle" class="panel" role="tabpanel" aria-labelledby="tab-settle" hidden>
            <div class="panel__content">
              <div id="settle-summary" class="settle-summary"></div>
            </div>
          </section>
        </main>

        <div id="footer-mount-trip"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
